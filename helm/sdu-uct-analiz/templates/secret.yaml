{{- if not .Values.secrets.existingSecret }}
{{- $secretName := include "sdu-uct-analiz.secretName" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $clickhousePassword := randAlphaNum 32 }}
{{- $llmApiKey := .Values.secrets.llmApiKey }}
{{- if .Values.secrets.clickhousePassword }}
{{- $clickhousePassword = .Values.secrets.clickhousePassword }}
{{- else if and $existing (hasKey $existing.data "clickhouse-password") }}
{{- $clickhousePassword = index $existing.data "clickhouse-password" | b64dec }}
{{- end }}
{{- if and (not $llmApiKey) $existing (hasKey $existing.data "llm-api-key") }}
{{- $llmApiKey = index $existing.data "llm-api-key" | b64dec }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "sdu-uct-analiz.labels" . | nindent 4 }}
type: Opaque
stringData:
  clickhouse-password: {{ $clickhousePassword | quote }}
  llm-api-key: {{ $llmApiKey | quote }}
{{- end }}

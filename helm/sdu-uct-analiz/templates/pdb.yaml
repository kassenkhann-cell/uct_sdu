{{- if .Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "sdu-uct-analiz.fullname" . }}
  labels:
    {{- include "sdu-uct-analiz.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "sdu-uct-analiz.appSelectorLabels" . | nindent 6 }}
{{- end }}

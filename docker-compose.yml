services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./docker/clickhouse/init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
      - ./data/derived:/var/lib/clickhouse/user_files/derived:ro
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    image: ${APP_IMAGE:-digital-radar-aktobe-app:latest}
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATA_MODE: clickhouse
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_SECURE: "false"
      CLICKHOUSE_VERIFY: "false"
      CORS_ORIGINS: http://localhost:8000
    ports:
      - "8000:8000"
    depends_on:
      clickhouse:
        condition: service_healthy
